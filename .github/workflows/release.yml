name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    concurrency: release-${{ github.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}   # build the tagged commit

      - name: Generate homebrew tap token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: runpod
          repositories: homebrew-runpodctl

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.app-token.outputs.token }}

  # Linear release tracking. Only runs for tag pushes, not manual dispatch.
  linear-sync:
    name: Linear Release Sync
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_RELEASE_ACCESS_KEY }}
          command: sync
          version: ${{ github.ref_name }}
          name: runpodctl ${{ github.ref_name }}

  linear-complete:
    name: Linear Release Complete
    needs: [release, linear-sync]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_RELEASE_ACCESS_KEY }}
          command: complete
          version: ${{ github.ref_name }}
